<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/static/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
.container {
    width: 90%;
    max-width: 500px;
    margin: 20px auto;
    padding: 20px;
    padding-bottom: 90px;
}

.profile-header {
  text-align: center;
  margin-bottom: 20px;
}

.profile-avatar {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: linear-gradient(45deg, #00ffff, #0072ff);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
  margin: auto;
  box-shadow: 0 0 15px rgba(0,255,255,0.4);
}

.profile-name {
  margin-top: 10px;
  font-size: 1.2rem;
  font-weight: bold;
}

.stats-box {
  margin: 15px 0;
  padding: 15px;
  border-radius: 12px;
  background: rgba(255,255,255,0.05);
  box-shadow: 0 0 10px rgba(0,255,255,0.1);
}

.xp-section {
  margin-top: 20px;
  text-align: center;
}

.xp-bar {
    width: 100%;
    height: 14px;
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    overflow: hidden;
}

.xp-fill {
    height: 100%;
    width: 0%;
    border-radius: 20px;
    transition: width 1.5s ease-in-out;
}

.rank-badge {
  display: inline-block;
  padding: 5px 12px;
  border-radius: 20px;
  background: #00ffff;
  color: #000;
  font-weight: bold;
}

/* 🔥 REMOVE EMPTY BADGE LOOK */
.badge-grid:empty {
  display: none;
}

/* 🔥 POPUP */
.level-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  backdrop-filter: blur(12px);
  background: rgba(0,0,0,0.6);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.level-popup {
  width: 90%;
  max-width: 350px;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  background: linear-gradient(135deg, #00ffff, #0077ff);
  color: #000;
}

.level-popup button {
  margin-top: 20px;
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  background: black;
  color: white;
  cursor: pointer;
}

/* NAV */
.bottom-nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  justify-content: space-around;
  background: rgba(0,0,0,0.95);
  padding: 12px 0;
}
</style>
</head>

<body>

<div class="container">

<div class="profile-header">
  <div class="profile-avatar">{{ username[0]|upper }}</div>
  <div class="profile-name">{{ username }}</div>
  <div class="rank-badge">{{ rank }}</div>
</div>

<div class="stats-box">
  <p>⚡ XP: {{ xp }}</p>
  <p>🎯 Accuracy: {{ accuracy }}%</p>
</div>

<div class="xp-section">
  <p>Progress To Next Level</p>
  <div class="xp-bar"><div class="xp-fill" id="xpFill"></div></div>
</div>

<div class="stats-box">
  <p>Total Attempts: {{ attempts }}</p>
  <p>Total Score: {{ score }}</p>
</div>

<canvas id="chart"></canvas>

<br>
<a href="/quiz"><button>Start Quiz</button></a>
<a href="/leaderboard"><button>Leaderboard</button></a>

</div>

<!-- POPUP -->
<div id="levelUpOverlay" class="level-overlay" style="display:none;">
  <div class="level-popup">
    <h2>Level Up 🚀</h2>
    <p>You Reached {{ rank }}</p>
    <button onclick="closeLevelPopup()">Continue</button>
  </div>
</div>

<div class="bottom-nav">
  <a href="/quiz">🧠</a>
  <a href="/profile">👤</a>
  <a href="/leaderboard">🏆</a>
  <a href="/logout">🚪</a>
</div>

<script>
const scores = {{ scores | tojson if scores else "[]" }};

// Chart
if (scores.length > 0) {
    new Chart(document.getElementById('chart'), {
        type: 'line',
        data: {
            labels: scores.map((_, i) => "Attempt " + (i + 1)),
            datasets: [{
                data: scores,
                borderColor: 'cyan',
                tension: 0.3
            }]
        }
    });
}

// XP Animation
const xp = {{ xp }};
const percent = xp % 100;
document.getElementById("xpFill").style.width = percent + "%";

// Popup Trigger
{% if level_up %}
document.getElementById("levelUpOverlay").style.display = "flex";
{% endif %}

function closeLevelPopup() {
    document.getElementById("levelUpOverlay").style.display = "none";
}
</script>

</body>
</html>
