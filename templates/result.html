<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="/static/style.css">
</head>

<body>
<div class="container">

  <!-- RESULT CONTENT -->
  <div id="resultContent">
    <h1>🎯 Score: {{ score }}/{{ total }}</h1>

    {% if wrong|length == 0 %}
      <h2>🔥 Perfect Score! Well Done</h2>
    {% else %}
      <h2>📚 Learn From Mistakes</h2>

{% for w in wrong %}
<div class="wrong">
  <p><b>{{ w.q }}</b></p>
  <p>Correct: {{ w.correct }}</p>

  <!-- Explanation Container -->
  <div id="exp{{ loop.index }}"></div>

  <script>
    const expData{{ loop.index }} = {{ w.exp | tojson | safe }};
    showExplanation(1, "exp{{ loop.index }}", expData{{ loop.index }});
  </script>

</div>
{% endfor %}
    {% endif %}
  </div>

  <!-- TRY AGAIN -->
  <div class="center-buttons">
    <form action="/">
      <button>Try Again</button>
    </form>
  </div>

</div>

<!-- BACKGROUND -->
<div class="bg-shape shape1"></div>
<div class="bg-shape shape2"></div>

<!-- 🔥 Explanation Logic -->
<script>

showExplanation(
    1,
    "exp{{ loop.index }}",
    {{ w.exp | tojson }}
  );
  
</script>

</body>
</html>
