<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/static/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* 🔥 Container Upgrade (Mobile + Desktop Safe) */
.container {
    width: 90%;
    max-width: 500px;
    margin: 20px auto;
    padding: 20px;
}

/* 🔥 Sections */
.stats-box {
  margin: 15px 0;
  padding: 15px;
  border-radius: 12px;
  background: rgba(255,255,255,0.05);
  box-shadow: 0 0 10px rgba(0,255,255,0.1);
}

/* 🔥 XP Section */
.xp-section {
  margin-top: 20px;
  text-align: center;
}

.xp-bar {
    width: 100%;
    height: 14px;
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    overflow: hidden;
}

.xp-fill {
    height: 100%;
    background: linear-gradient(90deg, #00ffff, #00ff99);
    width: 0%;
    border-radius: 20px;
    transition: width 1s ease-in-out;
    box-shadow: 0 0 10px #00ffff;
}

/* 🔥 Rank Badge */
.rank-badge {
  display: inline-block;
  padding: 5px 12px;
  border-radius: 20px;
  background: #00ffff;
  color: #000;
  font-weight: bold;
}

/* 🔥 LEVEL UP POPUP */
.level-popup {
  position: fixed;
  top: 20%;
  left: 50%;
  transform: translateX(-50%) scale(0.8);
  background: #00ffff;
  color: black;
  padding: 20px;
  border-radius: 12px;
  text-align: center;
  opacity: 0;
  transition: all 0.4s ease;
  z-index: 999;
}

.level-popup.show {
  opacity: 1;
  transform: translateX(-50%) scale(1);
}

/* 🔥 Buttons */
button {
    width: 100%;
    margin-top: 10px;
    padding: 12px;
    border-radius: 10px;
}

/* 🔥 Mobile Bottom Nav */
.bottom-nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  max-width: 500px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.8);
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
  border-top: 1px solid rgba(255,255,255,0.1);
}

.bottom-nav a {
  color: white;
  font-size: 20px;
  text-decoration: none;
}

/* 🔥 Desktop Adjustment */
@media (min-width: 768px) {
  .bottom-nav {
    display: none;
  }
}

</style>
</head>

<body>

<div class="container">

<h1>📊 Your Dashboard</h1>

<!-- USER INFO -->
<div class="stats-box">
  <p><b>👤 User:</b> {{ username }}</p>
  <p><b>🏆 Rank:</b> <span class="rank-badge">{{ rank }}</span></p>
  <p><b>⚡ XP:</b> {{ xp }}</p>
  <p><b>🎯 Accuracy:</b> {{ accuracy }}%</p>
</div>

<!-- XP PROGRESS -->
<div class="xp-section">
  <p>Progress To Next Level</p>
  <div class="xp-bar">
    <div class="xp-fill" id="xpFill"></div>
  </div>
</div>

<!-- LEVEL UP POPUP -->
<div id="levelUpPopup" class="level-popup">
  <h2>🚀 Level Up!</h2>
  <p id="newRankText"></p>
</div>

<!-- STATS -->
<div class="stats-box">
  <p>Total Attempts: {{ attempts }}</p>
  <p>Total Score: {{ score }}</p>
</div>

<!-- CHART -->
<canvas id="chart"></canvas>

<br>

<div class="center-buttons">
  <a href="/"><button>Back To Home</button></a>
  <a href="/leaderboard"><button>Leaderboard</button></a>
</div>

</div>

<!-- MOBILE NAV -->
<div class="bottom-nav">
  <a href="/quiz">🧠</a>
  <a href="/dashboard">📊</a>
  <a href="/leaderboard">🏆</a>
  <a href="/logout">🚪</a>
</div>

<!-- CHART SCRIPT -->
<script>
const scores = {{ scores | tojson if scores else "[]" }};
const totals = {{ totals | tojson if totals else "[]" }};

if (scores.length > 0) {
  new Chart(document.getElementById('chart'), {
      type: 'line',
      data: {
          labels: scores.map((_, i) => "Attempt " + (i + 1)),
          datasets: [{
              label: 'Scores',
              data: scores,
              borderColor: 'cyan',
              tension: 0.3
          }]
      },
      options: { responsive: true }
  });
}
</script>

<!-- XP SYSTEM -->
<script>
document.addEventListener("DOMContentLoaded", () => {

  const xp = {{ xp }};
  const progress = xp % 100;

  const fill = document.getElementById("xpFill");

  if (fill) {
    setTimeout(() => {
      fill.style.width = progress + "%";
    }, 200);
  }

  // LEVEL SYSTEM
  const lastXP = parseInt(localStorage.getItem("lastXP")) || 0;

  const lastLevel = Math.floor(lastXP / 100);
  const currentLevel = Math.floor(xp / 100);

  if (currentLevel > lastLevel) {
    const popup = document.getElementById("levelUpPopup");
    const rankText = document.getElementById("newRankText");

    rankText.innerText = "New Rank: {{ rank }}";

    popup.classList.add("show");

    setTimeout(() => {
      popup.classList.remove("show");
    }, 2500);
  }

  localStorage.setItem("lastXP", xp);

});
</script>

</body>
</html>
