<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/static/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* 🔥 Premium Sections */
.stats-box {
  margin: 15px 0;
  padding: 15px;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
  box-shadow: 0 0 10px rgba(0,255,255,0.1);
}

.xp-section {
  margin-top: 20px;
  text-align: center;
}

.xp-bar {
  width: 100%;
  height: 14px;
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
  overflow: hidden;
  margin-top: 10px;
}

.xp-fill {
  height: 100%;
  background: linear-gradient(90deg, #00ffff, #00ff99);
  width: 0%;
  transition: width 1s ease-in-out;
  box-shadow: 0 0 10px #00ffff;
}

.rank-badge {
  display: inline-block;
  padding: 5px 12px;
  border-radius: 20px;
  background: #00ffff;
  color: #000;
  font-weight: bold;
  margin-top: 5px;
}
</style>
</head>

<body>

<div class="container">

<h1>📊 Your Dashboard</h1>

<!-- 🔥 USER INFO -->
<div class="stats-box">
  <p><b>👤 User:</b> {{ username }}</p>
  <p><b>🏆 Rank:</b> <span class="rank-badge">{{ rank }}</span></p>
  <p><b>⚡ XP:</b> {{ xp }}</p>
  <p><b>🎯 Accuracy:</b> {{ accuracy }}%</p>
</div>

<!-- 🔥 XP PROGRESS -->
<div class="xp-section">
  <p>Progress To Next Level</p>
  <div class="xp-bar">
    <div class="xp-fill" id="xpFill"></div>
  </div>
</div>

<!-- 🔥 LEVEL UP POPUP -->
<div id="levelUpPopup" class="level-popup">
  <h2>🚀 Level Up!</h2>
  <p id="newRankText"></p>
</div>
  
<!-- 🔥 STATS -->
<div class="stats-box">
  <p>Total Attempts: {{ attempts }}</p>
  <p>Total Score: {{ score }}</p>
</div>

<!-- 🔥 CHART -->
<canvas id="chart"></canvas>

<br>

<div class="center-buttons">
  <a href="/"><button>Back To Home</button></a>
  <a href="/leaderboard"><button>Leaderboard</button></a>
</div>

<!-- 🔥 MOBILE NAVBAR -->
<div class="bottom-nav">
  <a href="/quiz">🧠</a>
  <a href="/dashboard">📊</a>
  <a href="/leaderboard">🏆</a>
  <a href="/logout">🚪</a>
</div>

</div>

<!-- 🔥 CHART SCRIPT -->
<script>
const scores = {{ scores | tojson if scores else "[]" }};
const totals = {{ totals | tojson if totals else "[]" }};

const ctx = document.getElementById('chart').getContext('2d');

if (scores.length > 0) {
  new Chart(ctx, {
      type: 'line',
      data: {
          labels: scores.map((_, i) => "Attempt " + (i + 1)),
          datasets: [{
              label: 'Scores',
              data: scores,
              fill: false,
              borderColor: 'rgba(0, 255, 255, 1)',
              tension: 0.3
          }]
      },
      options: {
          responsive: true,
          plugins: {
              legend: { position: 'top' }
          },
          scales: {
              y: {
                  beginAtZero: true,
                  suggestedMax: Math.max(...totals, 10)
              }
          }
      }
  });
}
</script>

<!-- 🔥 XP ANIMATION -->
<script>
const xp = {{ xp }};
const progress = xp % 100;

const fill = document.getElementById("xpFill");

setTimeout(() => {
  fill.style.width = progress + "%";
}, 300);

// 🔥 LEVEL UP DETECTION
const lastXP = localStorage.getItem("lastXP") || 0;

if (xp > lastXP && (xp % 100) < (lastXP % 100)) {
  const popup = document.getElementById("levelUpPopup");
  const rankText = document.getElementById("newRankText");

  rankText.innerText = "New Rank: {{ rank }}";

  popup.classList.add("show");

  setTimeout(() => {
    popup.classList.remove("show");
  }, 2500);
}

localStorage.setItem("lastXP", xp);
</script>
{% if data|length == 0 %}
<p style="text-align:center;">No Players Yet</p>
{% endif %}

<!-- BACKGROUND SYSTEM -->
<div class="bg-shape shape1"></div>
<div class="bg-shape shape2"></div>
<div class="cursor-glow"></div>
<canvas id="particles"></canvas>

</body>
</html>
