<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/static/style.css">
<script src="/static/script.js" defer></script>

<style>

/* 🔥 FULL WIDTH APP STYLE */
.container {
    width: 95%;
    max-width: 1200px;
    margin: 10px auto;
    padding: 20px;
}

/* 🔥 TOP BAR */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

#timer {
  font-size: 1.3rem;
  font-weight: bold;
  color: #00ffff;
}

.xp-box {
  font-size: 0.95rem;
  opacity: 0.8;
}

/* 🔥 QUESTION CARD */
.question {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  margin-bottom: 20px;
  border-radius: 12px;
  backdrop-filter: blur(12px);
  transition: 0.3s;
}

.question:hover {
  box-shadow: 0 0 25px rgba(0,255,255,0.25);
  transform: translateY(-2px);
}

/* 🔥 OPTIONS */
label {
  display: block;
  padding: 10px;
  border-radius: 6px;
  cursor: pointer;
  transition: 0.2s;
}

label:hover {
  background: rgba(0,255,255,0.12);
}

input[type="radio"] {
  margin-right: 10px;
}

/* 🔥 ANSWER STATES */
.correct {
  background: rgba(0,255,0,0.25);
}

.wrong {
  background: rgba(255,0,0,0.25);
}

/* 🔥 EXPLANATION */
.explanation-box {
  margin-top: 15px;
  padding: 15px;
  border-radius: 8px;
  background: rgba(0,0,0,0.5);
  display: none;
}

.level-buttons {
  display: flex;
  flex-wrap: wrap;
}

.level-buttons button {
  margin: 5px;
  padding: 6px 10px;
  font-size: 0.8rem;
}

/* 🔥 SUBMIT BUTTON */
.submit-btn {
  padding: 14px 30px;
  font-size: 1rem;
  width: 100%;
  max-width: 300px;
}

/* 🔥 MOBILE OPTIMIZATION */
@media (max-width: 768px) {

  .container {
    width: 100%;
    padding: 15px;
  }

  .top-bar {
    flex-direction: column;
    align-items: flex-start;
  }

  #timer {
    margin-bottom: 5px;
  }

  .question {
    padding: 15px;
  }

  .submit-btn {
    width: 100%;
  }
}

</style>

</head>

<body>

<div class="container">

<!-- 🔥 TOP BAR -->
<div class="top-bar">
  <h2 id="timer">Time: 60</h2>
  <div class="xp-box">XP Progress Active</div>
</div>

<form action="/submit" method="post">

{% for q in questions %}
<div class="question" data-id="{{ q.id }}">

  <p><b>{{ loop.index }}. {{ q.q }}</b></p>

  {% set q_index = loop.index0 %}

  {% for opt in q.options %}
  <label>
    <input 
      type="radio" 
      name="q{{ q_index }}" 
      value="{{ opt }}" 
      required
      onclick="checkAnswer({{ q.id }}, this.value, this)"
    >
    {{ opt }}
  </label>
  {% endfor %}

  <!-- 🔥 EXPLANATION -->
  <div class="explanation-box">
    
    <div class="level-buttons">
      <button type="button" onclick="showLevel(this, 'level1')">Level 1</button>
      <button type="button" onclick="showLevel(this, 'level2')">Level 2</button>
      <button type="button" onclick="showLevel(this, 'level3')">Level 3</button>
    </div>

    <div class="explanation-content"></div>
  </div>

</div>
{% endfor %}

<!-- 🔥 SUBMIT -->
<div class="center-buttons" style="text-align:center;">
  <button type="submit" class="submit-btn">Submit Test</button>
</div>

</form>

</div>

<!-- 🔥 BACKGROUND SYSTEM -->
<div class="bg-shape shape1"></div>
<div class="bg-shape shape2"></div>
<div class="cursor-glow"></div>
<canvas id="particles"></canvas>

<script>

/* 🔥 CURSOR GLOW */
document.addEventListener("mousemove", (e) => {
  const glow = document.querySelector(".cursor-glow");
  if (glow) {
    glow.style.left = e.clientX + "px";
    glow.style.top = e.clientY + "px";
  }
});

/* 🔥 PARTICLES */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();

let particles = [];
for (let i = 0; i < 60; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 2 + 1,
    dx: (Math.random() - 0.5) * 0.4,
    dy: (Math.random() - 0.5) * 0.4
  });
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.x += p.dx;
    p.y += p.dy;

    if (p.x > canvas.width) p.x = 0;
    if (p.x < 0) p.x = canvas.width;
    if (p.y > canvas.height) p.y = 0;
    if (p.y < 0) p.y = canvas.height;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(0,255,255,0.5)";
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize", resizeCanvas);

</script>

</body>
</html>
