<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aptitude Test Home</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    /* Ensuring body takes full height and centers content */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      overflow: hidden;
      color: #fff;
    }

    .main-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 10;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 20px;
    }

    .home-img {
      width: 150px;
      margin-bottom: 20px;
      border-radius: 10px;
    }

    input[type="text"] {
      padding: 10px;
      width: 250px;
      border-radius: 5px;
      border: none;
      margin-bottom: 20px;
    }

    button {
      padding: 10px 20px;
      margin: 5px;
      border: none;
      border-radius: 5px;
      background: #00ffff;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover {
      background: #00b3b3;
      color: #fff;
    }

    .center-buttons {
      margin-top: 20px;
    }

    /* Background Shapes */
    .bg-shape {
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      filter: blur(100px);
      z-index: 1;
    }

    .shape1 {
      background: rgba(0, 255, 255, 0.2);
      top: -100px;
      left: -100px;
    }

    .shape2 {
      background: rgba(255, 0, 255, 0.2);
      bottom: -100px;
      right: -100px;
    }

    /* Cursor Glow */
    .cursor-glow {
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      pointer-events: none;
      background: rgba(0, 255, 255, 0.5);
      filter: blur(8px);
      z-index: 20;
      transform: translate(-50%, -50%);
    }

    /* Particles canvas */
    canvas#particles {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    /* Responsive */
    @media (max-width: 500px) {
      input[type="text"] { width: 200px; }
      h1 { font-size: 2rem; }
    }
  </style>
</head>

<body>

  <!-- Background Shapes & Cursor Glow -->
  <div class="bg-shape shape1"></div>
  <div class="bg-shape shape2"></div>
  <div class="cursor-glow"></div>
  <canvas id="particles"></canvas>

  <!-- Main Content -->
  <div class="main-container">
    <h1>🧠 APTITUDE TEST</h1>

    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQm0AmfJ8QENqp9dbUYb2vuWT9pBygXkMdkdq90lEAREoriXGmHEvCtJ0L8&s=10" 
         alt="Aptitude Test" class="home-img">

    <form action="/quiz" method="post">
      <input type="text" name="username" placeholder="Enter Your Name" required>
      <br><br>
      <button type="submit">Start Test</button>
    </form>

    <div class="center-buttons">
      <button onclick="window.location.href='/dashboard'">Dashboard</button>
      <button onclick="window.location.href='/leaderboard'">Leaderboard</button>
    </div>
  </div>

  <!-- Scripts -->
  <script>
    // Cursor Glow Follow
    document.addEventListener("mousemove", (e) => {
      const glow = document.querySelector(".cursor-glow");
      glow.style.left = e.clientX + "px";
      glow.style.top = e.clientY + "px";
    });

    // Particle Background
    const canvas = document.getElementById("particles");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let particles = [];
    for (let i = 0; i < 80; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 3 + 1,
        dx: (Math.random() - 0.5) * 0.5,
        dy: (Math.random() - 0.5) * 0.5
      });
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        p.x += p.dx; p.y += p.dy;
        if (p.x > canvas.width) p.x = 0;
        if (p.x < 0) p.x = canvas.width;
        if (p.y > canvas.height) p.y = 0;
        if (p.y < 0) p.y = canvas.height;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.fillStyle = "rgba(0,255,255,0.5)";
        ctx.fill();
      });
      requestAnimationFrame(animate);
    }

    animate();

    // Adjust canvas on window resize
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>

</body>
</html>
